services:
  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_METABASE_URL: ${NEXT_PUBLIC_METABASE_URL:-http://localhost:3001}
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_METABASE_URL: ${NEXT_PUBLIC_METABASE_URL:-http://localhost:3001}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
            - npm-debug.log*
            - yarn-debug.log*
            - yarn-error.log*
            - .DS_Store
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/package-lock.json

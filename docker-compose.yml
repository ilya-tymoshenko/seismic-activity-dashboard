services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: earthquake-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-earthquakes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-earthquakes}"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrations:
    build:
      context: ./migrations
    container_name: earthquake-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-earthquakes}?sslmode=disable
      GOOSE_VERBOSE: "true"
    volumes:
      - ./migrations:/migrations:ro
    command: ["-dir", "/migrations", "up"]

  backend:
    build:
      context: ./backend
    container_name: earthquake-backend
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-earthquakes}?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      USGS_MIN_MAGNITUDE: ${USGS_MIN_MAGNITUDE:-2.5}
      USGS_HISTORY_DAYS: ${USGS_HISTORY_DAYS:-365}
      USGS_HISTORY_CHUNK_DAYS: ${USGS_HISTORY_CHUNK_DAYS:-30}
      USGS_SYNC_FEED: ${USGS_SYNC_FEED:-2.5_day}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_METABASE_URL: ${NEXT_PUBLIC_METABASE_URL:-http://localhost:3001}
    container_name: earthquake-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
      NEXT_PUBLIC_METABASE_URL: ${NEXT_PUBLIC_METABASE_URL:-http://localhost:3001}
    ports:
      - "3000:3000"

  metabase:
    image: metabase/metabase:v0.50.29
    container_name: earthquake-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "3001:3000"
    volumes:
      - metabase-data:/metabase-data

  metabase-setup:
    image: node:20.18-alpine
    container_name: earthquake-metabase-setup
    depends_on:
      metabase:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    working_dir: /setup
    environment:
      MB_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL:-admin@example.com}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD:-admin12345}
      MB_ADMIN_FIRST_NAME: ${MB_ADMIN_FIRST_NAME:-Demo}
      MB_ADMIN_LAST_NAME: ${MB_ADMIN_LAST_NAME:-Admin}
      MB_APP_DB_NAME: ${MB_APP_DB_NAME:-Earthquakes}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-earthquakes}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./metabase/setup:/setup:ro
    command: ["node", "/setup/setup.js"]
    restart: "no"

volumes:
  pgdata:
  metabase-data:
